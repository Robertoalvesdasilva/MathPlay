<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MathPlay - Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="game-wrapper">
    <div class="game-header">
        <div class="stat-box">
            <span class="label">PONTOS</span>
            <span id="game-score" class="value">0</span>
        </div>
        <div class="game-title-mini">
            <h2>Matematika+</h2>
        </div>
        <div class="stat-box">
            <span class="label">TEMPO</span>
            <span id="game-timer" class="value">30s</span>
        </div>
    </div>

    <div class="question-container">
        <div id="question-text" class="question">15 + 7</div>
        <div class="answer-section">
            <input type="number" id="answer-input" placeholder="?" autocomplete="off">
            <button id="submit-answer">CONFIRMAR</button>
        </div>
    </div>

    <div class="navigation-footer">
        <button id="back-to-menu" class="btn-small">Voltar</button>
        <button id="logout-button" class="btn-small">Sair</button>
    </div>
</div>

  <script src="game-script.js"></script>
</body>
</html>
