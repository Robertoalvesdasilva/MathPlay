<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MathPlay - Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body>
  <div class="dashboard-wrapper">
    <div class="user-header">
        <h1>Olá, <span id="welcome-username">Jogador</span>! 🚀</h1>
        <div class="score-badge">
            <span class="label">SUA MELHOR MARCA</span>
            <span id="display-best-score">0</span>
        </div>
    </div>

    <div class="selection-grid">
        <div class="selection-card">
            <h2>Configurar Partida</h2>
            
            <div class="input-group">
                <label>Dificuldade</label>
                <select id="difficulty-select">
                    <option value="easy">🟢 Fácil</option>
                    <option value="medium">🟡 Médio</option>
                    <option value="hard">🔴 Difícil</option>
                </select>
            </div>

            <div class="input-group">
                <label>Modalidade</label>
                <select id="modality-select">
                    <option value="arithmetic">➕ Aritmética</option>
                    <option value="algebra">✖️ Álgebra</option>
                </select>
            </div>

            <button id="start-game-button" class="main-btn">COMEÇAR JOGO</button>
            <button id="logout-button" class="btn-ghost">Sair da Conta</button>
        </div>

        <div class="leaderboard-card">
            <h2>🏆 Top 10 Global</h2>
            <ul id="leaderboard-list" class="leaderboard-list">
                <li>Carregando ranking...</li>
            </ul>
        </div>
    </div>
</div>

  <script src="game-script.js"></script>
</body>
</html>
