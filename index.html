<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathPlay - Bem-vindo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img src="imagens/tela de fundo game.jpg" alt="Fundo" class="bg-tela">

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-tabs">
                <button id="tab-login" class="tab-btn active" onclick="showAuth('login')">Login</button>
                <button id="tab-signup" class="tab-btn" onclick="showAuth('signup')">Cadastro</button>
            </div>

            <div id="form-login">
                <h2>Entrar</h2>
                <div class="input-group">
                    <label>Usuário</label>
                    <input type="text" id="login-user" placeholder="Seu usuário">
                </div>
                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" id="login-pass" placeholder="Sua senha">
                </div>
                <button id="btn-entrar" class="main-btn">ENTRAR</button>
            </div>

            <div id="form-signup" class="hidden">
                <h2>Criar Conta</h2>
                <div class="input-group">
                    <label>Escolha um Usuário</label>
                    <input type="text" id="reg-user" placeholder="Ex: Roberto123">
                </div>
                <div class="input-group">
                    <label>Crie uma Senha</label>
                    <input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres">
                </div>
                <button id="btn-cadastrar" class="main-btn">CADASTRAR</button>
            </div>
        </div>
    </div>

    <script>
        function showAuth(type) {
            document.getElementById('form-login').classList.toggle('hidden', type !== 'login');
            document.getElementById('form-signup').classList.toggle('hidden', type !== 'signup');
            document.getElementById('tab-login').classList.toggle('active', type === 'login');
            document.getElementById('tab-signup').classList.toggle('active', type === 'signup');
        }
    </script>
    <script src="auth-script.js"></script>
</body>
</html>
