<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matematika+ (bom 👍)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="brand">
            <h1 class="logo">Matematika+</h1>
            <p class="tagline">(bom 👍)</p>
        </div>

        <div class="auth-card">
            <div id="login-form">
                <h2>Bem-vindo de volta!</h2>
                <div class="input-group">
                    <input type="text" id="login-username" placeholder="Usuário" required>
                    <input type="password" id="login-password" placeholder="Senha" required>
                </div>
                <button id="login-button" class="main-btn">ENTRAR</button>
                <p class="switch-text">Novo por aqui? <a href="#" id="show-register">Criar conta</a></p>
            </div>

            <div id="register-form" class="hidden">
                <h2>Criar nova conta</h2>
                <div class="input-group">
                    <input type="text" id="register-username" placeholder="Escolha um usuário" required>
                    <input type="password" id="register-password" placeholder="Crie uma senha" required>
                    <input type="password" id="register-confirm" placeholder="Confirme a senha" required>
                </div>
                <button id="register-button" class="main-btn">CADASTRAR</button>
                <p class="switch-text">Já tem conta? <a href="#" id="show-login">Fazer Login</a></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
